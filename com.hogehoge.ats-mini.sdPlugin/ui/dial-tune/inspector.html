<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      color: #ccc;
      background: transparent;
      margin: 0;
      padding: 8px;
    }
    .row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    label { min-width: 80px; color: #bbb; }
    select {
      flex: 1;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
    }
    .hint { color: #888; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="row">
    <label>Mode</label>
    <select id="autoTune">
      <option value="true">Auto-tune on rotate</option>
      <option value="false">Press to confirm</option>
    </select>
  </div>
  <div class="hint" id="hint">Turning the dial tunes immediately.</div>
  <div class="row" style="margin-top:12px">
    <label>Border</label>
    <select id="borderSide">
      <option value="none">None</option>
      <option value="left">Left side</option>
      <option value="right">Right side</option>
    </select>
  </div>
</body>
<script>
  var websocket, uuid;
  var currentSettings = {};

  function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
    uuid = inUUID;

    websocket = new WebSocket('ws://127.0.0.1:' + inPort);
    websocket.onopen = function() {
      websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
      websocket.send(JSON.stringify({ event: 'getSettings', context: uuid }));
    };

    websocket.onmessage = function(evt) {
      var msg = JSON.parse(evt.data);
      if (msg.event === 'didReceiveSettings') {
        currentSettings = msg.payload.settings || {};
        var autoTune = currentSettings.autoTune;
        if (autoTune === undefined) autoTune = true;
        document.getElementById('autoTune').value = String(autoTune);
        updateHint(autoTune);
        document.getElementById('borderSide').value = currentSettings.borderSide || 'none';
      }
    };
  }

  function updateHint(autoTune) {
    var hint = document.getElementById('hint');
    hint.textContent = (autoTune === true || autoTune === 'true')
      ? 'Turning the dial tunes immediately.'
      : 'Turn to select, press dial to tune.';
  }

  function saveSettings() {
    websocket.send(JSON.stringify({
      event: 'setSettings',
      context: uuid,
      payload: currentSettings
    }));
  }

  document.getElementById('autoTune').addEventListener('change', function() {
    var autoTune = this.value === 'true';
    updateHint(autoTune);
    currentSettings.autoTune = autoTune;
    saveSettings();
  });

  document.getElementById('borderSide').addEventListener('change', function() {
    currentSettings.borderSide = this.value;
    saveSettings();
  });
</script>
</html>
